name = "bobsled-leaderboard"
main = "src/index.js"
compatibility_date = "2024-12-01"

# Custom domain route (requires DNS CNAME pointed to workers.dev)
routes = [
  { pattern = "api.bobsled.qkleinfelter.com/*", zone_name = "qkleinfelter.com" }
]

# R2 bucket binding
[[r2_buckets]]
binding = "LEADERBOARD_BUCKET"
bucket_name = "bobsled-leaderboard"

[vars]
# Maximum entries per track leaderboard
MAX_ENTRIES = "10"

# CORS origin — set to your deployed frontend URL in production
CORS_ORIGIN = "https://bobsled.qkleinfelter.com"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1